# =============================================================================
# ClimateNews Cloud Build CI/CD — LEAN / Tiny Launch Edition
# =============================================================================
# No Redis, no VPC, no Cloud Run Jobs. Cloud Scheduler POSTs to API endpoints.
# Triggers on push to the main branch.
#
# Setup:
#   1. Connect your GitHub repo in Cloud Build > Triggers
#   2. Create a trigger for the main branch pointing to this file
#   3. Grant Cloud Build service account:
#      - roles/run.admin
#      - roles/iam.serviceAccountUser
#      - roles/secretmanager.secretAccessor
# =============================================================================

substitutions:
  _PROJECT_ID: climatenews-495412
  _REGION: europe-west4
  _REPO: climatenews
  _API_SERVICE: climatenews-api
  _FRONTEND_SERVICE: climatenews-frontend
  _TAG: $SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # -------------------------------------------------------------------------
  # Step 0: Run migrations (Phase 8 2026-05-24)
  #
  # Applies infrastructure/database/migrations/versions/*.sql to the
  # Cloud SQL instance via cloud-sql-proxy. Idempotent — tracker table
  # plus heuristic bootstrap means rerunning is safe. Runs FIRST so the
  # new code is never deployed against an out-of-date schema.
  # -------------------------------------------------------------------------
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "run-migrations"
    entrypoint: "bash"
    secretEnv: ["DATABASE_URL_RAW"]
    args:
      - "-c"
      - |
        set -e
        apt-get update -qq
        apt-get install -y -qq python3 python3-pip libpq-dev gcc
        pip3 install --quiet --break-system-packages "psycopg2-binary>=2.9"
        curl -sSL -o cloud-sql-proxy \
          https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.11.4/cloud-sql-proxy.linux.amd64
        chmod +x cloud-sql-proxy
        ./cloud-sql-proxy --port 5432 \
          ${_PROJECT_ID}:${_REGION}:climatenews-postgres &
        PROXY_PID=$$!
        sleep 5
        DATABASE_URL=$$(python3 -c "
        import os, urllib.parse as up
        raw = os.environ['DATABASE_URL_RAW']
        raw = raw.replace('postgresql+psycopg2://', 'postgresql://', 1)
        p = up.urlparse(raw)
        db = p.path.lstrip('/').split('?')[0] or 'climatenews'
        print(f'postgresql://{p.username}:{p.password}@127.0.0.1:5432/{db}')
        ")
        export DATABASE_URL
        # First-run floor (older migrations already applied to this DB but
        # weren't tracked) + idempotency tolerance for duplicate inserts
        # from old non-idempotent migrations.
        export MIGRATIONS_FROM="009"
        export MIGRATIONS_TOLERATE_ERRORS="true"
        python3 scripts/run_migrations.py
        # Verify critical post-migration state — fails the deploy if a
        # migration silently no-op'd (catches the mig-049-class bug
        # where ON CONFLICT DO NOTHING masked an intended upgrade).
        # See scripts/verify_migration_state.py for the invariant list.
        python3 scripts/verify_migration_state.py
        kill $$PROXY_PID || true

  # -------------------------------------------------------------------------
  # Step 1a: Run backend test suite (CI-gate — 2026-06-14)
  #
  # Mirrors the GitHub Actions CI workflow. Runs the same pytest suite to
  # catch regressions before the image is built. Fails LOUD (not advisory)
  # so a broken build cannot reach production.
  #
  # Env vars match the CI environment to avoid the import-time crash class
  # (JWT_SECRET_KEY is fail-closed at import). The cloud-sql-proxy is NOT
  # needed — unit/api tests either mock DB or use the dummy-DB path.
  # -------------------------------------------------------------------------
  - name: "python:3.13-slim"
    id: "run-tests"
    waitFor: ["run-migrations"]
    env:
      - "JWT_SECRET_KEY=cloudbuild-ci-key-not-for-prod-min-32chars"
      - "OTEL_SDK_DISABLED=true"
      - "CLILENS_ENV=test"
      - "CLILENS_ALLOW_FAKE_SEED=0"
      - "CLILENS_ALLOW_MOCK_API=0"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        pip install --quiet -r requirements.txt
        pip install --quiet pytest pytest-asyncio pytest-mock httpx
        pytest -p no:warnings -x \
          tests/api/test_oauth_routes.py \
          tests/api/test_url_analysis_routes.py \
          tests/api/test_green_transition_routes.py \
          tests/api/test_cynefin_router.py \
          tests/api/test_session_lifecycle.py \
          tests/api/test_chat_view_context.py \
          tests/api/test_deep_search_routes.py \
          tests/api/test_map_routes.py \
          tests/api/test_country_coverage.py \
          tests/api/test_chat_routes.py \
          tests/api/test_indicators_climate_trace.py \
          tests/api/test_indicators_owid.py \
          tests/api/test_indicators_climate_action_tracker.py \
          tests/api/test_sustainability_score.py \
          tests/api/test_prompts_registry.py \
          tests/api/test_methodology_routes.py \
          tests/api/test_provenance.py \
          tests/api/test_drift_detection.py \
          tests/api/test_multi_llm_verifier.py \
          tests/api/test_anthropic_claim_extractor.py \
          tests/unit/test_claim_json_parsing.py \
          tests/api/test_calibration.py \
          tests/api/test_calibration_store.py \
          tests/unit/api/test_rate_limiter.py \
          tests/api/test_quota_service.py \
          tests/api/test_quota_endpoint_integration.py \
          tests/api/test_url_analysis_failures.py \
          tests/api/test_agentic_skill_pin.py \
          tests/api/test_chat_actions_parse.py \
          tests/api/test_subscription_schema_alignment.py \
          tests/api/test_source_health.py \
          tests/api/test_aoi_service.py \
          tests/api/test_aoi_poll_service.py \
          tests/api/test_scheduler_aoi_poll.py \
          tests/api/test_skills_registry.py \
          tests/api/test_company_routes.py \
          tests/unit/domains/test_source_profiles_credibility_tiers.py \
          tests/unit/domains/test_source_tier_service.py \
          tests/unit/domains/test_embedding_bge_m3.py \
          tests/unit/domains/test_numeric_grounding.py \
          tests/backend/test_reliability_scorer_density.py \
          tests/backend/test_reliability_3axis.py \
          tests/api/test_url_credibility_scoring.py \
          tests/unit/test_credibility_thresholds.py \
          tests/unit/test_country_code_normalization.py \
          tests/unit/test_feed_registry_sync.py \
          tests/unit/domains/test_fact_check_pipeline.py \
          tests/unit/domains/test_chat_actions.py \
          tests/unit/domains/test_llm_routing.py \
          tests/unit/core/test_redis_client.py \
          tests/unit/core/test_compliance.py \
          tests/backend/unit/test_text_utils.py \
          tests/unit/domains/test_content_repository.py \
          tests/api/test_premium_feature_matrix.py \
          tests/api/test_golden_examples_gate.py \
          tests/unit/test_migration_hygiene.py \
          tests/adversarial/
        pytest tests/adversarial/ -p no:warnings

  # -------------------------------------------------------------------------
  # Step 1: Build API image
  # -------------------------------------------------------------------------
  - name: "gcr.io/cloud-builders/docker"
    id: "build-api"
    waitFor: ["run-tests"]
    args:
      - "build"
      - "--platform=linux/amd64"
      - "-f"
      - "infrastructure/gcp/api-prod.Dockerfile"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/api:${_TAG}"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: "push-api"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/api:${_TAG}"
    waitFor:
      - "build-api"

  # -------------------------------------------------------------------------
  # Step 2: Deploy API (lean config: 512Mi, 1 CPU, scale-to-zero)
  # -------------------------------------------------------------------------
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "deploy-api"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_API_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/api:${_TAG}"
      - "--region=${_REGION}"
      - "--project=${_PROJECT_ID}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8000"
      - "--update-secrets=DATABASE_URL=database-url:latest"
      - "--update-secrets=SCHEDULER_SECRET=scheduler-secret:latest"
      - "--update-secrets=JWT_SECRET_KEY=jwt-secret-key:latest"
      - "--update-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest"
      - "--update-secrets=OPENAI_API_KEY=openai-api-key:latest"
      - "--update-secrets=PERPLEXITY_API_KEY=perplexity-api-key:latest"
      - "--update-secrets=STRIPE_SECRET_KEY=stripe-secret-key:latest"
      - "--update-secrets=STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest"
      - "--update-secrets=SENDGRID_API_KEY=sendgrid-api-key:latest"
      - "--update-secrets=GOOGLE_CLIENT_ID=google-client-id:latest"
      - "--update-secrets=GOOGLE_CLIENT_SECRET=google-client-secret:latest"
      - "--update-secrets=DEEPSEEK_API_KEY=deepseek-api-key:latest"
      - "--update-secrets=NOAA_API_TOKEN=noaa-api-token:latest"
      - "--update-secrets=NASA_API_KEY=nasa-api-key:latest"
      # Phase 8 (2026-05-24) — gates POST /api/companies/admin/sync/{source}
      - "--update-secrets=CORPORATE_SYNC_TOKEN=corporate-sync-token:latest"
      # 2026-05-27 — on-prem GX10 (DGX Spark) LLM endpoint reached via Cloudflare
      # Tunnel. Persisted here so Cloud Build redeploys don't wipe the
      # secret mounts that `wire-gx10.sh` initially attached. See
      # docs/improvementplans/KG-Robustness-Audit-2026-05-27.md +
      # docs/reports/asusgx10inferencestrategy.md for the rationale.
      - "--update-secrets=CLILENS_LOCAL_GX10_BASE_URL=clilens-local-gx10-base-url:latest"
      - "--update-secrets=CLILENS_LOCAL_GX10_API_KEY=clilens-local-gx10-api-key:latest"
      - "--update-secrets=CLILENS_LOCAL_GX10_MODEL=clilens-local-gx10-model:latest"
      # 2026-06-14 — Stripe Basic ($10) and Pro ($20) price IDs.
      # These map 1:1 to the STRIPE_PRICE_ID_BASIC / STRIPE_PRICE_ID_PRO
      # env vars read by subscription_routes.py.
      - "--update-secrets=STRIPE_PRICE_ID_BASIC=stripe-price-basic:latest"
      - "--update-secrets=STRIPE_PRICE_ID_PRO=stripe-price-pro:latest"
      - "--update-env-vars=ENVIRONMENT=production"
      - "--update-env-vars=LOG_LEVEL=INFO"
      - "--update-env-vars=API_HOST=0.0.0.0"
      - "--update-env-vars=API_PORT=8000"
      - "--update-env-vars=CLILENS_ENRICHMENT_PROVIDER=local-gx10"
      # seq-5 (2026-06-02) — stamp the deployed commit so /api/methodology
      # returns a real git_revision (was null) for honest traceability.
      - "--update-env-vars=GIT_COMMIT_SHA=$COMMIT_SHA"
      # F12a (2026-05-31) — analytics admin gate admits enterprise tier OR
      # emails here. Owner email so require_analytics_admin doesn't 403 the
      # operator out of their own /api/analytics/* dashboard. Additive flag.
      - "--update-env-vars=ADMIN_EMAILS=eljailari.suhonen@gmail.com"
      - "--memory=1Gi"
      - "--cpu=1"
      - "--concurrency=80"
      - "--max-instances=5"
      # Phase 8 (2026-05-24) — keep 1 instance warm so FastAPI
      # BackgroundTasks (corporate adapter sync) actually complete instead
      # of being killed when Cloud Run scales to zero. Negligible cost.
      - "--min-instances=1"
      # Phase 8 (2026-05-24) — bump from 300s to 1800s so the corporate
      # adapter sync (10k+ row SBTi import) doesn't get killed mid-flight.
      - "--timeout=1800"
      - "--quiet"
    waitFor:
      - "push-api"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "get-api-url"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -euo pipefail
        # 2026-05-28 hardening: verify the new revision is actually
        # Ready=True before we proceed to FE build. If not, hard-fail
        # the build instead of continuing with a broken API. This catches
        # the "Container import failed" class of error that previously
        # produced cloud_build status=SUCCESS with no running new code.
        #
        # Approach: compare latestCreatedRevisionName vs
        # latestReadyRevisionName on the service. When they match, the
        # newly created revision is also the latest ready one, meaning
        # the deploy succeeded end-to-end. Simpler + more reliable than
        # trying to filter conditions[?type=Ready] in gcloud's format
        # expression (which silently returned empty and broke the build).
        LATEST_CREATED=$(gcloud run services describe ${_API_SERVICE} \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --format='value(status.latestCreatedRevisionName)')
        LATEST_READY=$(gcloud run services describe ${_API_SERVICE} \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --format='value(status.latestReadyRevisionName)')
        echo "Latest created: $$LATEST_CREATED"
        echo "Latest ready:   $$LATEST_READY"
        if [ "$$LATEST_CREATED" != "$$LATEST_READY" ]; then
          echo "ERROR: Latest created revision ($$LATEST_CREATED) is not the latest ready one ($$LATEST_READY)."
          echo "This means the new deploy failed to become healthy. Conditions:"
          gcloud run revisions describe $$LATEST_CREATED \
            --region=${_REGION} \
            --project=${_PROJECT_ID} \
            --format='value(status.conditions)'
          exit 1
        fi
        API_URL=$(gcloud run services describe ${_API_SERVICE} \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --format='value(status.url)')
        echo "API_URL=$${API_URL}" >> /workspace/vars.env
        echo "API URL: $${API_URL}"
    waitFor:
      - "deploy-api"

  # -------------------------------------------------------------------------
  # Step 3: Build Frontend (with real API URL baked at build time)
  # -------------------------------------------------------------------------
  - name: "gcr.io/cloud-builders/docker"
    id: "build-frontend"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        source /workspace/vars.env
        docker build \
          --platform=linux/amd64 \
          --build-arg=NEXT_PUBLIC_API_URL=$${API_URL} \
          -f infrastructure/gcp/frontend-prod.Dockerfile \
          -t ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/frontend:${_TAG} \
          src/frontend
    waitFor:
      - "get-api-url"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/frontend:${_TAG}"
    waitFor:
      - "build-frontend"

  # -------------------------------------------------------------------------
  # Step 4: Deploy Frontend (lean config: 256Mi, 1 CPU, scale-to-zero)
  # -------------------------------------------------------------------------
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "deploy-frontend"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_FRONTEND_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/frontend:${_TAG}"
      - "--region=${_REGION}"
      - "--project=${_PROJECT_ID}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=3000"
      - "--update-env-vars=NODE_ENV=production"
      - "--update-env-vars=NEXT_TELEMETRY_DISABLED=1"
      - "--update-env-vars=HOSTNAME=0.0.0.0"
      - "--memory=256Mi"
      - "--cpu=1"
      - "--concurrency=100"
      - "--max-instances=3"
      - "--min-instances=0"
      - "--timeout=60"
      - "--quiet"
    waitFor:
      - "push-frontend"

  # -------------------------------------------------------------------------
  # Step 5: Update Cloud Scheduler URLs and CORS
  # -------------------------------------------------------------------------
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "update-schedulers"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -euo pipefail
        # 2026-05-28 hardening: removed `|| true` on CORS env-var
        # update — that swallowed failures and is exactly how CORS_ORIGINS
        # got silently dropped, producing "Could not connect to API" for
        # users. Hard-fail the build if this step fails.
        source /workspace/vars.env
        SCHEDULER_SECRET=$(gcloud secrets versions access latest --secret=scheduler-secret --project=${_PROJECT_ID})
        FRONTEND_URL=$(gcloud run services describe ${_FRONTEND_SERVICE} \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --format='value(status.url)')
        gcloud run services update ${_API_SERVICE} \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --update-env-vars=CORS_ORIGINS=$${FRONTEND_URL} \
          --quiet
        
        JOBS=(
          "cn-discover:/api/scheduler/ingestion/discover"
          "cn-rss-poll:/api/scheduler/ingestion/rss"
          "cn-verify:/api/scheduler/processing/verify-pending"
          "cn-retry:/api/scheduler/processing/retry-failed"
          "cn-feeds:/api/scheduler/feeds/update"
          "cn-translate:/api/scheduler/translation/batch"
          "cn-link-check:/api/admin/link-check"
          "cn-research-poll:/api/admin/research-poll"
          "cn-aoi-poll:/api/scheduler/aoi-poll"
          "cn-enrich:/api/admin/scheduler/enrich-pending"
          "cn-credibility-backfill:/api/admin/backfill/source-credibility-score"
          "cn-html-backfill:/api/admin/backfill/extracted-text-html"
          "cn-ner-extract:/api/admin/scheduler/extract-entities"
        )
        for entry in "${JOBS[@]}"; do
          name="${entry%%:*}"
          path="${entry##*:}"
          if gcloud scheduler jobs describe "$${name}" --location=${_REGION} --project=${_PROJECT_ID} >/dev/null 2>&1; then
            # Honest logging (2026-06-10 audit): don't print "Updated" when the
            # update actually failed. Non-fatal — a scheduler URL refresh is not
            # worth failing the whole deploy over — but surfaced as a warning.
            if gcloud scheduler jobs update http "$${name}" \
              --location=${_REGION} \
              --project=${_PROJECT_ID} \
              --uri="$${API_URL}$${path}" \
              --headers="X-Scheduler-Secret=$${SCHEDULER_SECRET}" \
              --quiet; then
              echo "Updated scheduler: $${name}"
            else
              echo "WARNING: scheduler URL update failed for $${name} (non-fatal)" >&2
            fi
          fi
        done
    waitFor:
      - "deploy-frontend"

availableSecrets:
  secretManager:
    - versionName: projects/${_PROJECT_ID}/secrets/database-url/versions/latest
      env: "DATABASE_URL_RAW"

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/api:${_TAG}"
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/frontend:${_TAG}"

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'climatenews-api'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'climatenews-services'
    static_configs:
      - targets: 
        - 'ingestion-service:8001'
        - 'orchestration-service:8002'
        - 'content-creation-service:8003'
        - 'verification-service:8004'
        - 'video-production-service:8005'

# Docker Compose - Simplified Configuration
# Contains only the working, essential services
#
# This is the ACTUAL operational architecture (not the planned microservices)
#
# Usage:
#   docker-compose -f docker-compose.simple.yml up -d
#
# Services included:
#   - Frontend (Next.js/React)
#   - API (FastAPI)
#   - PostgreSQL (with pgvector)
#   - Redis (caching)
#   - Celery worker (background jobs)
#   - Jaeger (tracing UI)
#
# Services removed (not functional, require Kafka):
#   - orchestration-service
#   - ingestion-service
#   - verification-service
#   - content-creation-service
#   - video-production-service
#   - kafka, zookeeper, schema-registry
#   - monitoring stack (grafana, prometheus)

services:
  # =============================================================================
  # DATABASE & CACHE
  # =============================================================================

  postgres:
    image: pgvector/pgvector:pg16
    container_name: climatenews-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: climatenews
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - climatenews-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: climatenews-redis
    ports:
      - "5379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - climatenews-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M

  # =============================================================================
  # APPLICATION SERVICES
  # =============================================================================

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: clilens-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5400:8000"
    environment:
      - ENVIRONMENT=production
      - PYTHONPATH=/app/src/backend
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/climatenews
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:5300,http://localhost:5400,http://127.0.0.1:5300,http://127.0.0.1:5400
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=clilens-api
    env_file:
      - .env
    volumes:
      - ./api:/app/api
      - ./src/backend:/app/src/backend
      - ./schemas:/app/schemas
    networks:
      - climatenews-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: clilens-frontend
    depends_on:
      - api
    ports:
      - "5300:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5400
      - API_INTERNAL_URL=http://api:8000
    networks:
      - climatenews-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: clilens-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENVIRONMENT=development
      - PYTHONPATH=/app/src/backend
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/climatenews
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=clilens-celery
    env_file:
      - .env
    volumes:
      - ./src/backend:/app/src/backend
      - ./schemas:/app/schemas
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=INFO", "--uid=nobody"]
    networks:
      - climatenews-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery_app inspect ping --timeout 10 2>/dev/null | grep -q OK || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  celery-beat:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: clilens-celery-beat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENVIRONMENT=development
      - PYTHONPATH=/app/src/backend
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/climatenews
    env_file:
      - .env
    volumes:
      - ./src/backend:/app/src/backend
      - ./schemas:/app/schemas
    command: ["celery", "-A", "app.core.celery_app", "beat", "--loglevel=INFO", "--uid=nobody", "--schedule=/tmp/celerybeat-schedule"]
    networks:
      - climatenews-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat-schedule || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: climatenews-jaeger
    ports:
      - "5686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - climatenews-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:16686/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  climatenews-network:
    driver: bridge
    name: climatenews-network

volumes:
  postgres-data:
    name: climatenews-postgres-data
  redis-data:
    name: climatenews-redis-data

# =============================================================================
# REMOVED SERVICES (Not functional without Kafka infrastructure)
# =============================================================================
#
# The following services were removed because they are not operational:
#
# 1. Kafka Infrastructure:
#    - zookeeper (Kafka coordination)
#    - kafka (message broker)
#    - schema-registry (message validation)
#
# 2. Microservices (all depend on Kafka):
#    - orchestration-service (workflow coordinator)
#    - ingestion-service (web scraping)
#    - verification-service (fact-checking)
#    - content-creation-service (content generation)
#    - video-production-service (video creation)
#
# 3. Observability Stack (optional, commented out in original):
#    - grafana (metrics dashboard)
#    - prometheus (metrics collection)
#    - jaeger (distributed tracing)
#
# To restore these services:
#   1. Start Kafka infrastructure first
#   2. Wait for Kafka to be fully ready (30-60 seconds)
#   3. Start microservices
#   4. Monitor logs for connectivity issues
#
# Note: The current API works independently without these services.
# =============================================================================




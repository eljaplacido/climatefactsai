[pytest]
# Pytest configuration for Climate News MAS
# Comprehensive testing infrastructure with markers, coverage, and fixtures

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers for categorization and filtering
markers =
    unit: Unit tests (fast, no external services)
    integration: Integration tests (requires external services like DB, API)
    e2e: End-to-end tests (full system testing)
    slow: Slow running tests (>1 second)
    kafka: Tests requiring Kafka infrastructure
    redis: Tests requiring Redis cache
    postgres: Tests requiring PostgreSQL database
    api: API endpoint tests
    service: Business logic service tests
    fixture: Fixture and mock tests
    evaluation: LLM evaluation tests (requires API keys, slow)
    adversarial: Adversarial robustness probes (Phase 6 — hostile input, parsing edge cases)

# Command-line options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=api
    --cov=src/backend
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=term:skip-covered
    --cov-report=json
    --disable-warnings
    -ra
    --ignore=tests/evaluation
    -n auto
    --maxfail=5
    --dist loadscope

# Timeout configuration (300 seconds for slow tests, 10 seconds default)
timeout = 10
timeout_func_only = true

# Ignore paths to avoid scanning
norecursedirs =
    .git
    .venv
    venv
    __pycache__
    dist
    build
    *.egg-info
    .pytest_cache
    .coverage

# Logging configuration
log_cli = false
log_cli_level = ERROR
log_file = tests/pytest.log
log_file_level = DEBUG

# Coverage configuration
[coverage:run]
source = api,src/backend
omit =
    */site-packages/*
    */venv/*
    */tests/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
sort = Cover
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @overload
    class .*\bProtocol\):
    ^\s*\.\.\.\s*$

[coverage:html]
directory = htmlcov

[coverage:json]
output = coverage.json
pretty_print = true


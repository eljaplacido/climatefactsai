  # =============================================================================
  # WEB APPLICATION
  # =============================================================================

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: clilens-api
    depends_on:
      - postgres
      - redis
      # kafka removed - not operational (see docker-compose.override.yml)
    ports:
      - "5400:8000"  # Standardized to 5400 (matches docker-compose.simple.yml)
    environment:
      - ENVIRONMENT=development
      - PYTHONPATH=/app/src/backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=clilens-api
    env_file:
      - .env
    volumes:
      - ./api:/app/api
      - ./src/backend:/app/src/backend
      - ./schemas:/app/schemas
    networks:
      - climatenews-network
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5400
    container_name: clilens-frontend
    depends_on:
      - api
    ports:
      - "5300:3000"  # Frontend runtime (Next.js on port 3000)
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5400  # Browser-facing API URL
      - API_INTERNAL_URL=http://api:8000  # Internal Docker network URL for SSR
    networks:
      - climatenews-network
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: clilens-celery-worker
    depends_on:
      - postgres
      - redis
    environment:
      - ENVIRONMENT=development
      - PYTHONPATH=/app/src/backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=clilens-celery
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/climatenews
    env_file:
      - .env
    volumes:
      - ./src/backend:/app/src/backend
      - ./schemas:/app/schemas
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=INFO"]
    networks:
      - climatenews-network
    restart: unless-stopped

  # =============================================================================
  # OBSERVABILITY & MONITORING
  # =============================================================================

  # Grafana
  grafana:
    image: grafana/grafana:10.2.0
    container_name: climatenews-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infrastructure/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - climatenews-network

  # Prometheus (optional - for metrics collection)
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: climatenews-prometheus
    ports:
      - "5090:9090"  # Changed from 9090 to avoid conflict with rs-mcp
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - climatenews-network

  # Jaeger (optional - for distributed tracing)
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: climatenews-jaeger
    ports:
      - "5775:5775/udp"  # OK - not in conflict list
      - "5831:6831/udp"  # Changed from 6831 to be consistent with 5xxx range
      - "5832:6832/udp"  # Changed from 6832 to be consistent with 5xxx range
      - "5778:5778"      # OK - not in conflict list
      - "5686:16686"     # Changed Jaeger UI from 16686 to 5xxx range
      - "5268:14268"     # Changed from 14268 to 5xxx range
      - "5250:14250"     # Changed from 14250 to 5xxx range
      - "5411:9411"      # Changed from 9411 to 5xxx range
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - climatenews-network

networks:
  climatenews-network:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  redis-data:
  postgres-data:
  grafana-data:
  prometheus-data:


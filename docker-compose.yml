  # Redis (Short-term memory)
  redis:
    image: redis:7-alpine
    container_name: climatenews-redis
    ports:
      - "5379:6379"  # Changed from 6379 to avoid conflict
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - climatenews-network

  # PostgreSQL (Long-term memory)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: climatenews-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: climatenews
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/database/db-init.sh:/docker-entrypoint-initdb.d/db-init.sh:ro
      - ./infrastructure/database/init.sql:/docker-entrypoint-initdb.d/sql/init.sql:ro
      - ./infrastructure/database/02_countries_and_translations.sql:/docker-entrypoint-initdb.d/sql/02_countries_and_translations.sql:ro
      - ./infrastructure/database/03_users_and_subscriptions.sql:/docker-entrypoint-initdb.d/sql/03_users_and_subscriptions.sql:ro
      - ./infrastructure/database/04_countries_seed.sql:/docker-entrypoint-initdb.d/sql/04_countries_seed.sql:ro
      - ./migrations/versions:/docker-entrypoint-initdb.d/sql/migrations:ro
    networks:
      - climatenews-network

